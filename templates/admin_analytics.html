<!DOCTYPE html>
<html>
<head>
<title>SaaS Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
}

h1 { margin-bottom: 20px; }
</style>
</head>

<body>

<h1>📊 SaaS Analytics Dashboard</h1>

<div class="grid">

    <div class="card">
        <h2 id="users">0</h2>
        <p>Total Users</p>
    </div>

    <div class="card">
        <h2 id="revenue">0</h2>
        <p>Revenue</p>
    </div>

    <div class="card">
        <h2 id="pending">0</h2>
        <p>Pending Payments</p>
    </div>

    <div class="card">
        <h2 id="usage">0</h2>
        <p>Total Usage</p>
    </div>

</div>

<canvas id="growthChart" style="margin-top:40px;"></canvas>

<script>

async function loadAnalytics() {

    const res = await fetch("/api/v1/analytics/overview");
    const data = await res.json();

    document.getElementById("users").innerText = data.total_users;
    document.getElementById("revenue").innerText = data.revenue;
    document.getElementById("pending").innerText = data.pending_payments;
    document.getElementById("usage").innerText = data.total_usage;

    renderChart(data);
}

function renderChart(data) {

    const ctx = document.getElementById("growthChart");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: ["Users", "Revenue", "Usage", "Pending"],
            datasets: [{
                label: "SaaS Growth Metrics",
                data: [
                    data.total_users,
                    data.revenue,
                    data.total_usage,
                    data.pending_payments
                ],
                borderColor: "#60a5fa",
                backgroundColor: "rgba(96,165,250,0.2)"
            }]
        }
    });
}

loadAnalytics();

</script>

</body>
</html>
